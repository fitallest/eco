<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#020617" />
    <meta name="format-detection" content="telephone=no" />
    <title>ECOLAW.AI - Tư vấn Pháp lý AI</title>
    <meta name="description" content="Hệ thống tư vấn pháp lý Real-time được hỗ trợ bởi trí tuệ nhân tạo đa tác nhân." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.tailwindcss.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      *, *::before, *::after {
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      html {
        -webkit-text-size-adjust: 100%;
        height: -webkit-fill-available;
        height: 100%;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: #020617;
        color: #e2e8f0;
        min-height: 100vh;
        min-height: -webkit-fill-available;
        padding-top: env(safe-area-inset-top);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }

      #root {
        min-height: 100vh;
        min-height: -webkit-fill-available;
      }

      /* Prevent iOS input zoom - inputs must be >= 16px */
      input, select, textarea {
        font-size: 16px !important;
      }
      @media (min-width: 768px) {
        input, select, textarea {
          font-size: inherit !important;
        }
      }

      /* Custom Scrollbar for Desktop */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a; 
      }
      ::-webkit-scrollbar-thumb {
        background: #334155; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569; 
      }

      /* Hide scrollbar on mobile for cleaner look */
      @media (max-width: 767px) {
        ::-webkit-scrollbar {
          width: 0;
          height: 0;
          display: none;
        }
        * {
          scrollbar-width: none;
        }
      }

      /* Safe area bottom padding utility */
      .safe-bottom {
        padding-bottom: max(env(safe-area-inset-bottom), 8px);
      }

      .markdown-body ul {
        list-style-type: disc;
        padding-left: 1.5rem;
        margin-bottom: 1rem;
        color: #cbd5e1;
      }
      .markdown-body p {
        margin-bottom: 0.75rem;
      }
      .markdown-body strong {
        font-weight: 600;
        color: #34d399;
      }
      .markdown-body h3 {
        color: #34d399;
        font-weight: 700;
        margin-top: 1.5rem;
        margin-bottom: 0.75rem;
        font-size: 1.125rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .markdown-body hr {
        border-color: #1e293b;
        margin: 1.5rem 0;
      }

      /* Animations */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      @keyframes scan {
        0% { left: -100%; }
        100% { left: 100%; }
      }
      .animate-scan {
        animation: scan 2s linear infinite;
      }
      
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-2px); }
        20%, 40%, 60%, 80% { transform: translateX(2px); }
      }
      .animate-shake {
        animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
      }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in {
        animation: fadeIn 0.2s ease-in-out forwards;
      }

      /* Mobile-optimized horizontal scroll */
      .mobile-scroll-x {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scroll-snap-type: x mandatory;
      }
      .mobile-scroll-x > * {
        scroll-snap-align: start;
      }

      /* Document Scanner — Laser sweep animation */
      @keyframes scannerLaser {
        0% { top: 15%; }
        50% { top: 75%; }
        100% { top: 15%; }
      }
      .animate-scanner-laser {
        animation: scannerLaser 2.5s ease-in-out infinite;
      }

      /* Risk Highlight — Pulse glow when clicked */
      @keyframes riskPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.4); }
        25% { box-shadow: 0 0 0 8px rgba(250, 204, 21, 0.15); }
        50% { box-shadow: 0 0 0 4px rgba(250, 204, 21, 0.3); }
        75% { box-shadow: 0 0 0 8px rgba(250, 204, 21, 0.15); }
      }
      .animate-risk-pulse {
        animation: riskPulse 1s ease-in-out 3;
        background-color: rgba(250, 204, 21, 0.25) !important;
      }

      /* Voice Lawyer - Waveform Animation */
      @keyframes wave {
        0%, 100% { transform: scaleY(0.5); }
        50% { transform: scaleY(1.5); }
      }
  </style>
</head>
  <body class="overflow-x-hidden w-full max-w-[100vw]">
    <div id="root" class="overflow-x-hidden w-full max-w-[100vw]"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
